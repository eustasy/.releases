name: 'Update: Merge Types'

on:
  workflow_dispatch:
  schedule:
    # * is a special character in YAML so you have to quote this string
    - cron:  '45 0 * * 1'
  push:
    branches: [main]
    paths:
      - '.github/workflows/merge_types.yml'
      - '_generators/merge_types.py'

permissions:
  contents: write

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python 3.13
      uses: actions/setup-python@v6
      with:
        python-version: 3.13
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyGithub
        pip install pyyaml
        pip install timeago
    - name: Run script and commit changes
      run: |
        python _generators/merge_types.py
        echo "Setting up git credentials..."
        git remote set-url origin https://x-access-token:"$GITHUB_TOKEN"@github.com/"$GITHUB_REPOSITORY".git
        git config --global user.email "actions@github.com"
        git config --global user.name "actions"
        echo "Git credentials configured."

        git checkout main
        git add .
        if git diff --cached --quiet; then
          echo "No changes to commit."
        else
          git commit -m "Update: Merge Types"
          # main may have moved while this job ran; rebase and retry so the
          # commit is never silently dropped on a non-fast-forward push.
          attempt=1
          until git push origin main; do
            if [ "$attempt" -ge 5 ]; then
              echo "Push failed after $attempt attempts."
              exit 1
            fi
            echo "Push rejected; syncing with main and retrying ($attempt)..."
            git pull --rebase origin main
            attempt=$((attempt + 1))
          done
        fi
      env:
        # The default GITHUB_TOKEN is scoped only to this repo, so it can read
        # merge settings for .releases but returns null for every other repo
        # (GitHub only exposes allow_*_merge to tokens with admin on the repo).
        # GORGON_V2 is an org-wide admin PAT, which is required to read them.
        GITHUB_TOKEN: ${{ secrets.GORGON_V2 }}
