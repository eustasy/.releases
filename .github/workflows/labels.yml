name: 'Update: Labels'

on:
  workflow_dispatch:
  schedule:
    # * is a special character in YAML so you have to quote this string
    - cron:  '15 0 * * 1'
  push:
    branches: [main]
    paths:
      - '.github/workflows/labels.yml'
      - '_generators/labels.py'

permissions:
  contents: write

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python 3.13
      uses: actions/setup-python@v6
      with:
        python-version: 3.13
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyGithub
        pip install pyyaml
    - name: Run script and commit changes
      run: |
        python _generators/labels.py
        echo "Setting up git credentials..."
        git remote set-url origin https://x-access-token:"$GITHUB_TOKEN"@github.com/"$GITHUB_REPOSITORY".git
        git config --global user.email "actions@github.com"
        git config --global user.name "actions"
        echo "Git credentials configured."

        git checkout main
        git add .
        if git diff --cached --quiet; then
          echo "No changes to commit."
        else
          git commit -m "Update: Labels"
          # main may have moved while this job ran; rebase and retry so the
          # commit is never silently dropped on a non-fast-forward push.
          attempt=1
          until git push origin main; do
            if [ "$attempt" -ge 5 ]; then
              echo "Push failed after $attempt attempts."
              exit 1
            fi
            echo "Push rejected; syncing with main and retrying ($attempt)..."
            git pull --rebase origin main
            attempt=$((attempt + 1))
          done
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
