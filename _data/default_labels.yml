# Organisation default labels for eustasy.
#
# GitHub does not expose org-level default labels via the API, so this file is
# the hand-maintained source of truth. Keep it in sync with the org settings at:
#   https://github.com/organizations/eustasy/settings/repository-defaults
#
# _generators/labels.py compares every repository's labels against this list and
# labels.html renders the result. Colours are 6-digit hex without a leading '#'.

